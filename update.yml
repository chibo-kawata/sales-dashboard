name: Update Sales Data

on:
  push:
    paths:
      - 'csv/**.csv'   # csvフォルダにCSVが追加・更新されたとき自動実行
  workflow_dispatch:   # 手動実行ボタンも有効

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Convert CSV to JSON
        run: python scripts/convert.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/sales.json
          git diff --staged --quiet || git commit -m "🔄 Update sales data [auto]"
          git push
