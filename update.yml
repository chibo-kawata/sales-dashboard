name: Update Sales Dashboard

on:
  push:
    paths:
      - 'csv/**.csv'      # csvフォルダにCSVが追加・更新されたとき
  workflow_dispatch:       # 手動実行ボタン

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Convert CSV → Embed into index.html
        run: python scripts/convert.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html data/sales.json
          git diff --staged --quiet || git commit -m "🔄 Update dashboard data [auto]"
          git push
